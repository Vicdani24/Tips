<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu FIFA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#070b14;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* CONTAINER */

.app{
width:100%;
max-width:500px;
}

/* CARD */

.card{
background:#111827;
padding:25px;
border-radius:25px;
border:1px solid #2563eb;
box-shadow:0 0 20px rgba(37,99,235,0.3);
}

/* TÍTULO */

.logo{
text-align:center;
font-size:38px;
font-weight:bold;
margin-bottom:35px;
color:#60a5fa;
}

/* BOTÕES */

.menu-btn{
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:#1e3a8a;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.menu-btn:hover{
background:#2563eb;
transform:scale(1.02);
}

/* SUBMENU */

.submenu{
display:none;
margin-bottom:15px;
}

.submenu button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#1f2937;
color:white;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.submenu button:hover{
background:#374151;
}

/* ÁREA */

.area{
display:none;
margin-top:25px;
}

/* INPUTS */

input{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:12px;
background:#1f2937;
color:white;
font-size:15px;
}

/* SAVE */

.save-card{
background:#1f2937;
padding:15px;
border-radius:15px;
margin-top:12px;
border:1px solid #2563eb;
}

.save-card h3{
margin-bottom:10px;
color:#60a5fa;
}

/* TÍTULOS */

.title-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.title-grid button{
padding:12px;
border:none;
border-radius:12px;
background:#1e3a8a;
color:white;
cursor:pointer;
transition:0.3s;
}

.title-grid button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div class="app">

<div class="card">

<div class="logo">
Meu FIFA
</div>

<!-- NOVA CARREIRA -->

<button class="menu-btn" onclick="toggleSubmenu()">
Nova Carreira
</button>

<div class="submenu" id="submenu">

<button onclick="abrirCriacao('Tecnico')">
Técnico
</button>

<button onclick="abrirCriacao('Jogador')">
Jogador
</button>

</div>

<!-- CARREGAR -->

<button class="menu-btn" onclick="mostrarCarreiras()">
Carregar Carreira
</button>

<!-- HISTÓRICO -->

<button class="menu-btn" onclick="mostrarHistorico()">
Histórico
</button>

<!-- ÁREA DINÂMICA -->

<div class="area" id="area"></div>

</div>

</div>

<script>

/* DADOS */

let saves = JSON.parse(localStorage.getItem('meuFifaSaves')) || [];

let saveAtual = null;

/* SUBMENU */

function toggleSubmenu(){

const submenu =
document.getElementById('submenu');

submenu.style.display =
submenu.style.display === 'block'
? 'none'
: 'block';

}

/* CRIAR CARREIRA */

function abrirCriacao(tipo){

const area =
document.getElementById('area');

area.style.display = 'block';

area.innerHTML = `

<h2 style="margin-bottom:20px;">
Nova Carreira - ${tipo}
</h2>

<input type="text" id="nomeSave" placeholder="Nome do Save">

<input type="text" id="clube" placeholder="Clube Inicial">

<input type="text" id="temporada" placeholder="Temporada">

<button class="menu-btn"
onclick="criarSave('${tipo}')">

Criar Carreira

</button>

`;

}

/* SALVAR SAVE */

function criarSave(tipo){

const save = {

tipo: tipo,

nome:
document.getElementById('nomeSave').value,

clube:
document.getElementById('clube').value,

temporada:
document.getElementById('temporada').value,

jogos:0,
vitorias:0,
empates:0,
derrotas:0,
golsMarcados:0,
golsSofridos:0,
overall:0,
gols:0,
assistencias:0,

titulos:[],
historico:[]

};

saves.push(save);

localStorage.setItem(
'meuFifaSaves',
JSON.stringify(saves)
);

alert('Carreira criada!');

mostrarCarreiras();

}

/* MOSTRAR SAVES */

function mostrarCarreiras(){

const area =
document.getElementById('area');

area.style.display = 'block';

area.innerHTML = `
<h2 style="margin-bottom:20px;">
Carreiras Salvas
</h2>
`;

saves.forEach((save,index)=>{

area.innerHTML += `

<div class="save-card">

<h3>${save.nome}</h3>

<p><strong>Tipo:</strong>
${save.tipo}</p>

<p><strong>Clube:</strong>
${save.clube}</p>

<p><strong>Temporada:</strong>
${save.temporada}</p>

<button class="menu-btn"
onclick="abrirDashboard(${index})">

Abrir Carreira

</button>

</div>

`;

});

}

/* DASHBOARD */

function abrirDashboard(index){

saveAtual = saves[index];

const area =
document.getElementById('area');

area.style.display = 'block';

area.innerHTML = `

<h2 style="margin-bottom:20px;">
${saveAtual.nome}
</h2>

<div class="save-card">

<p><strong>Clube:</strong>
${saveAtual.clube}</p>

<p><strong>Temporada:</strong>
${saveAtual.temporada}</p>

<p><strong>Tipo:</strong>
${saveAtual.tipo}</p>

</div>

<h2 style="margin-top:20px;">
Estatísticas
</h2>

<input type="number"
id="jogos"
placeholder="Jogos"
value="${saveAtual.jogos}">

<input type="number"
id="vitorias"
placeholder="Vitórias"
value="${saveAtual.vitorias}">

<input type="number"
id="empates"
placeholder="Empates"
value="${saveAtual.empates}">

<input type="number"
id="derrotas"
placeholder="Derrotas"
value="${saveAtual.derrotas}">

<input type="number"
id="gols"
placeholder="Gols"
value="${saveAtual.gols}">

<input type="number"
id="assistencias"
placeholder="Assistências"
value="${saveAtual.assistencias}">

<input type="number"
id="overall"
placeholder="Overall"
value="${saveAtual.overall}">

<button class="menu-btn"
onclick="salvarStats(${index})">

Salvar Estatísticas

</button>

<h2 style="margin-top:25px;">
Títulos
</h2>

<div class="title-grid">

<button onclick="adicionarTitulo(${index},'Nacional')">
Nacional
</button>

<button onclick="adicionarTitulo(${index},'Copa Nacional')">
Copa Nacional
</button>

<button onclick="adicionarTitulo(${index},'Libertadores')">
Libertadores
</button>

<button onclick="adicionarTitulo(${index},'Supercopa Nacional')">
Supercopa Nacional
</button>

<button onclick="adicionarTitulo(${index},'Champions')">
Champions
</button>

<button onclick="adicionarTitulo(${index},'Europa League')">
Europa League
</button>

<button onclick="adicionarTitulo(${index},'Supercopa Europeia')">
Supercopa Europeia
</button>

<button onclick="adicionarTitulo(${index},'Supercopa Sul-Americana')">
Supercopa Sul-Americana
</button>

<button onclick="adicionarTitulo(${index},'Mundial')">
Mundial
</button>

</div>

<div id="listaTitulos"></div>

<button class="menu-btn"
style="margin-top:25px;"
onclick="finalizarTemporada(${index})">

Finalizar Temporada

</button>

`;

mostrarTitulos();

}

/* SALVAR STATS */

function salvarStats(index){

saves[index].jogos =
document.getElementById('jogos').value;

saves[index].vitorias =
document.getElementById('vitorias').value;

saves[index].empates =
document.getElementById('empates').value;

saves[index].derrotas =
document.getElementById('derrotas').value;

saves[index].gols =
document.getElementById('gols').value;

saves[index].assistencias =
document.getElementById('assistencias').value;

saves[index].overall =
document.getElementById('overall').value;

localStorage.setItem(
'meuFifaSaves',
JSON.stringify(saves)
);

alert('Estatísticas salvas!');

}

/* TÍTULOS */

function adicionarTitulo(index,titulo){

saves[index].titulos.push({

nome:titulo,
temporada:saves[index].temporada

});

localStorage.setItem(
'meuFifaSaves',
JSON.stringify(saves)
);

mostrarTitulos();

}

/* MOSTRAR TÍTULOS */

function mostrarTitulos(){

const area =
document.getElementById('listaTitulos');

if(!area) return;

area.innerHTML = '';

saveAtual.titulos.forEach(titulo=>{

area.innerHTML += `

<div class="save-card">

🏆 ${titulo.nome}
(${titulo.temporada})

</div>

`;

});

}

/* FINALIZAR TEMPORADA */

function finalizarTemporada(index){

saves[index].historico.push({

temporada:saves[index].temporada,

clube:saves[index].clube,

gols:saves[index].gols,

assistencias:saves[index].assistencias,

titulos:[...saves[index].titulos]

});

localStorage.setItem(
'meuFifaSaves',
JSON.stringify(saves)
);

alert('Temporada arquivada!');

}

/* HISTÓRICO */

function mostrarHistorico(){

const area =
document.getElementById('area');

area.style.display = 'block';

area.innerHTML = `
<h2 style="margin-bottom:20px;">
Histórico
</h2>
`;

saves.forEach(save=>{

save.historico.forEach(temp=>{

area.innerHTML += `

<div class="save-card">

<h3>${save.nome}</h3>

<p><strong>Temporada:</strong>
${temp.temporada}</p>

<p><strong>Clube:</strong>
${temp.clube}</p>

<p><strong>Gols:</strong>
${temp.gols}</p>

<p><strong>Assistências:</strong>
${temp.assistencias}</p>

<p><strong>Títulos:</strong>
${temp.titulos.length}</p>

</div>

`;

});

});

}

</script>

</body>
</html>
